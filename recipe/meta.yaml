{% set name = "ldas-tools-ldasgen" %}
{% set version = "2.7.6" %}

{% set ldas_tools_al_version = "2.8.0" %}
{% set ldas_tools_cmake_version = "1.4.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: http://software.ligo.org/lscsoft/source/{{ name }}-{{ version }}.tar.gz
  sha256: f9f8d744cdf7720e3730b15947060888dc7c1efea16aa3573e62fd0887b3c3a6
  patches:
    - stat-preserve-errno.patch

build:
  error_overdepending: true
  error_overlinking: true
  number: 0
  run_exports:
    - {{ pin_subpackage("ldas-tools-ldasgen", max_pin="x.x") }}
  skip: true  # [win]

requirements:
  build:
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake >=3.6
    - make  # [unix]
    - pkg-config  # [unix]
  host:
    - libboost-headers
    - ldas-tools-al >={{ ldas_tools_al_version }}
    - ldas-tools-cmake >={{ ldas_tools_cmake_version }}
  run:
    - ldas-tools-al >={{ ldas_tools_al_version }}

test:
  requires:
    - pkg-config
  commands:
    - test -f ${PREFIX}/lib/libldasgen${SHLIB_EXT}  # [unix]
    - pkg-config --print-errors --exact-version {{ version }} ldastools-ldasgen

about:
  home: https://wiki.ligo.org/Computing/LDASTools
  dev_url: https://git.ligo.org/ldastools/LDAS_Tools.git
  license: GPL-2.0-or-later
  license_family: GPL
  license_file: COPYING
  summary: Filters library used by ldas-tools
  description: |
    This provides the runtime libraries for the filters library.

extra:
  recipe-maintainers:
    - duncanmmacleod
    - emaros
